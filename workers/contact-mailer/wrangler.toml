name = "contact-mailer"
main = "src/index.js"
compatibility_date = "2026-03-01"

[vars]
CONTACT_SENDER_EMAIL = "info@hooxygen.com.np"
CONTACT_RECIPIENT_EMAIL = "info@hooxygen.com.np"

[[send_email]]

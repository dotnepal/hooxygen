<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1E40AF" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Google Fonts: Sora (display) + DM Sans (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=DM+Sans:wght@400;500;700&display=swap"
      rel="stylesheet"
    />

    <title>HO Oxygen — Reliable Gas Supply for Medical & Industrial Use</title>
    <meta
      name="description"
      content="HO Oxygen provides reliable oxygen, nitrogen, and hydrogen gas supply for medical facilities, hospitals, and industrial users across Nepal."
    />
    <!-- Cloudflare Turnstile (explicit render — mounted by ContactPage) -->
    <script
      src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit"
      defer
    ></script>

    <!-- Blocking FOUC-prevention script is injected by vite-plugin-ssg via
         config.html.headTags in vite.config.ts — it appears in the built dist/ HTML,
         not here. In dev mode (npm run dev) the SSG HTML is never used, so no script
         is needed here. -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
